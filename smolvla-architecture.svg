<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480">
  <defs>
    <marker id="b1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
    <marker id="b2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/></marker>
    <marker id="b3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
    <marker id="b4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
    <marker id="b5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/></marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
  </defs>
  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Stage 1: Vision -->
  <rect x="15" y="55" width="400" height="220" rx="10" fill="rgba(34,211,238,0.05)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="25" y="75" fill="#22d3ee" font-size="10" font-weight="600" font-family="sans-serif">视觉编码 · EfficientViT-B1 (100M)</text>

  <rect x="35" y="155" width="110" height="70" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="90" y="180" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">📷 RGB</text>
  <text x="90" y="198" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">224×224×3</text>
  <text x="90" y="214" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">uint8</text>

  <rect x="175" y="150" width="115" height="80" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="177" y="152" width="111" height="76" rx="5" fill="#0f172a"/>
  <rect x="177" y="152" width="111" height="76" rx="5" fill="rgba(8,51,68,0.5)"/>
  <text x="232" y="178" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">EfficientViT</text>
  <text x="232" y="194" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">B1 · 3× 更快</text>
  <text x="232" y="214" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="sans-serif">196×512</text>

  <rect x="320" y="155" width="80" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="322" y="157" width="76" height="66" rx="5" fill="#0f172a"/>
  <rect x="322" y="157" width="76" height="66" rx="5" fill="rgba(120,53,15,0.3)"/>
  <text x="360" y="183" fill="white" font-size="10" font-weight="600" text-anchor="middle" font-family="sans-serif">Projector</text>
  <text x="360" y="201" fill="#fbbf24" font-size="8" text-anchor="middle" font-family="sans-serif">512→1024</text>
  <text x="360" y="215" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">~1M</text>

  <line x1="145" y1="190" x2="173" y2="190" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#b1)"/>
  <line x1="290" y1="190" x2="318" y2="190" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#b2)"/>

  <!-- Stage 2: Language -->
  <rect x="430" y="55" width="275" height="235" rx="10" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="440" y="75" fill="#34d399" font-size="10" font-weight="600" font-family="sans-serif">语言基座 · SmolLM 360M</text>
  <text x="440" y="90" fill="#475569" font-size="8" font-family="sans-serif">24 层 · d=1024 · SmolLM-1.7B 蒸馏</text>

  <rect x="450" y="140" width="155" height="100" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="452" y="142" width="151" height="96" rx="7" fill="#0f172a"/>
  <rect x="452" y="142" width="151" height="96" rx="7" fill="rgba(6,78,59,0.5)"/>
  <text x="527" y="172" fill="white" font-size="12" font-weight="700" text-anchor="middle" font-family="sans-serif">SmolLM 360M</text>
  <text x="527" y="192" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">24 层 Transformer</text>
  <text x="527" y="208" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">d=1024 · 仅指令理解</text>
  <text x="527" y="228" fill="#34d399" font-size="8" text-anchor="middle" font-family="sans-serif">196 视觉 + N 文本 token</text>

  <line x1="400" y1="190" x2="448" y2="190" stroke="#34d399" stroke-width="1.5" marker-end="url(#b3)"/>

  <!-- Text prompt -->
  <rect x="460" y="100" width="135" height="28" rx="4" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="527" y="118" fill="#fb923c" font-size="8" text-anchor="middle" font-family="sans-serif">📝 "pick bowl..."</text>
  <line x1="527" y1="128" x2="527" y2="138" stroke="#fb923c" stroke-width="1"/>

  <!-- Stage 3: Action -->
  <rect x="720" y="55" width="310" height="220" rx="10" fill="rgba(167,139,250,0.05)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="730" y="75" fill="#a78bfa" font-size="10" font-weight="600" font-family="sans-serif">动作解码 · Action Head (~2M)</text>

  <rect x="740" y="155" width="135" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="742" y="157" width="131" height="66" rx="5" fill="#0f172a"/>
  <rect x="742" y="157" width="131" height="66" rx="5" fill="rgba(76,29,149,0.4)"/>
  <text x="807" y="183" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">Action Head</text>
  <text x="807" y="201" fill="#a78bfa" font-size="8" text-anchor="middle" font-family="sans-serif">7×Linear(1024,256)</text>

  <rect x="900" y="150" width="115" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="902" y="152" width="111" height="76" rx="5" fill="#0f172a"/>
  <rect x="902" y="152" width="111" height="76" rx="5" fill="rgba(136,19,55,0.4)"/>
  <text x="957" y="178" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">🦾 7-dim</text>
  <text x="957" y="194" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">Action</text>
  <text x="957" y="212" fill="#fb7185" font-size="8" text-anchor="middle" font-family="sans-serif">Δx Δy Δz roll pitch yaw g</text>

  <line x1="605" y1="190" x2="738" y2="190" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#b4)"/>
  <line x1="875" y1="190" x2="898" y2="190" stroke="#fb7185" stroke-width="1.5" marker-end="url(#b5)"/>

  <!-- Dimension flow -->
  <rect x="35" y="310" width="980" height="48" rx="8" fill="rgba(15,23,42,0.8)" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="330" fill="#94a3b8" font-size="9" font-weight="600" font-family="sans-serif">维度变化</text>
  <text x="55" y="348" fill="#475569" font-size="8" font-family="sans-serif">(224,224,3) → (196,512) → (196,1024) → (196+N,1024) → (7,256) → (7,)</text>

  <!-- Comparison box -->
  <rect x="35" y="375" width="980" height="50" rx="6" fill="rgba(34,211,238,0.05)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="55" y="395" fill="#22d3ee" font-size="8" font-family="sans-serif">vs OpenVLA (7.1B): 视觉 384M→100M (3.8×) | 语言 6.7B→360M (18.6×) | 动作头 7M→2M (3.5×) | 总参数 15× 缩减</text>
  <text x="55" y="413" fill="#475569" font-size="7" font-family="sans-serif">代价: 成功率低 ~10pp · 优势: L40 全量微调只需 6h ($5) —— 一个下午迭代 4 组实验</text>

  <!-- Legend -->
  <rect x="35" y="440" width="14" height="10" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="55" y="449" fill="#94a3b8" font-size="8" font-family="sans-serif">视觉编码</text>
  <rect x="140" y="440" width="14" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="160" y="449" fill="#94a3b8" font-size="8" font-family="sans-serif">投影对齐</text>
  <rect x="250" y="440" width="14" height="10" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="270" y="449" fill="#94a3b8" font-size="8" font-family="sans-serif">SmolLM</text>
  <rect x="360" y="440" width="14" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="380" y="449" fill="#94a3b8" font-size="8" font-family="sans-serif">动作头</text>
  <rect x="470" y="440" width="14" height="10" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="490" y="449" fill="#94a3b8" font-size="8" font-family="sans-serif">动作输出</text>
</svg>