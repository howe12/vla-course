<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLA 从零到部署 — 具身智能教科书</title>
<style>
/* ============================================================
   教科书设计系统 — 基于 mujoco-quadruped-lab，零外部依赖
   ============================================================ */
:root {
  --bg-page:    #fdfbf7;
  --bg-content: #ffffff;
  --text:       #2c3e50;
  --head:       #1a1a2e;
  --muted:      #7f8c8d;
  --accent:     #8b5cf6;
  --link:       #7c3aed;
  --sidebar-bg:#1a1a2e;
  --sidebar-txt:#c8d6e5;
  --sidebar-hov:#2d3436;
  --sidebar-act:#a78bfa;
  --code-bg:    #2d3436;
  --code-txt:   #dfe6e9;
  --border:     #e0d8cc;
  --card-bg:    #f8f4ed;
  --card-bd:    #e8d5b7;
  --tip-bg:     #eaf7ee;
  --tip-bd:     #27ae60;
  --warn-bg:    #fef9e7;
  --warn-bd:    #f39c12;
  --info-bg:    #eaf2f8;
  --info-bd:    #8b5cf6;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.06);
  --shadow-md:  0 4px 12px rgba(0,0,0,.08);
  --radius:     8px;
  --sidebar-w:  270px;
  --content-w:  840px;
  --font-serif: Georgia, 'Noto Serif SC', 'STSong', serif;
  --font-sans:  'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono:  'Consolas', 'Courier New', 'Source Code Pro', monospace;
  --tr:         0.25s ease;
}
[data-theme="dark"] {
  --bg-page:    #1a1a2e;
  --bg-content: #22223b;
  --text:       #d5dbe3;
  --head:       #e8ecf1;
  --muted:      #8e99a4;
  --accent:     #a78bfa;
  --link:       #c4b5fd;
  --code-bg:    #111;
  --code-txt:   #e0e0e0;
  --border:     #3a3a5c;
  --card-bg:    #2a2a42;
  --card-bd:    #4a4a6a;
  --tip-bg:     #1a3a2a;
  --tip-bd:     #27ae60;
  --warn-bg:    #3a2a1a;
  --warn-bd:    #f39c12;
  --info-bg:    #1a2a3a;
  --info-bd:    #8b5cf6;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.3);
  --shadow-md:  0 4px 12px rgba(0,0,0,.4);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-sans);background:var(--bg-page);color:var(--text);line-height:1.85;display:flex;min-height:100vh;transition:background var(--tr),color var(--tr)}
noscript{padding:40px;text-align:center;color:var(--accent);font-size:1.1rem}

/* ── 侧边栏 ── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);color:var(--sidebar-txt);overflow-y:auto;z-index:100;transition:transform var(--tr);display:flex;flex-direction:column}
.sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h1{font-family:var(--font-serif);font-size:1.15rem;font-weight:700;color:#fff;line-height:1.4}
.sidebar-brand .sub{font-size:.75rem;opacity:.7;margin-top:4px}
.sidebar-nav{flex:1;padding:12px 0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 24px;color:var(--sidebar-txt);text-decoration:none;font-size:.875rem;transition:all var(--tr);border-left:3px solid transparent}
.sidebar-nav a:hover{background:var(--sidebar-hov);color:#fff}
.sidebar-nav a.active{background:rgba(139,92,246,.15);color:var(--sidebar-act);border-left-color:var(--sidebar-act);font-weight:600}
.sidebar-nav .num{font-family:var(--font-mono);font-size:.7rem;font-weight:700;opacity:.5;min-width:28px}
.sidebar-nav a.active .num{opacity:1;color:var(--sidebar-act)}
.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:.7rem;opacity:.5}
.theme-btn{background:none;border:1px solid rgba(255,255,255,.2);color:var(--sidebar-txt);cursor:pointer;padding:6px 12px;border-radius:4px;font-size:.75rem;margin:8px 24px;transition:all var(--tr)}
.theme-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}

.menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--sidebar-bg);color:#fff;border:none;width:40px;height:40px;border-radius:8px;font-size:1.2rem;cursor:pointer;box-shadow:var(--shadow-md)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.overlay.show{display:block}

/* ── 主内容 ── */
.main{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;justify-content:center}
.content{width:100%;max-width:var(--content-w);padding:48px 40px 80px}

.ch-header{margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.ch-num{font-size:.85rem;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.ch-header h2{font-family:var(--font-serif);font-size:1.9rem;font-weight:700;color:var(--head);line-height:1.3}
.ch-desc{font-size:1rem;color:var(--muted);margin-top:8px}

section{margin-bottom:38px}
section h3{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;color:var(--head);margin-bottom:14px;padding-bottom:5px;border-bottom:1px solid var(--border)}
section h4{font-size:1.05rem;font-weight:600;color:var(--head);margin:22px 0 10px}
p{margin-bottom:14px;text-align:justify}
strong{color:var(--head)}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}

.card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:var(--radius);padding:18px 22px;margin:20px 0;box-shadow:var(--shadow-sm)}
.card .card-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:6px}
.card h5{font-size:1rem;font-weight:700;color:var(--head);margin-bottom:6px}

.callout{border-left:4px solid var(--info-bd);background:var(--info-bg);border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;margin:18px 0}
.callout.tip{border-color:var(--tip-bd);background:var(--tip-bg)}
.callout.warn{border-color:var(--warn-bd);background:var(--warn-bg)}
.callout .lb{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.callout.tip .lb{color:var(--tip-bd)}
.callout.warn .lb{color:var(--warn-bd)}
.callout .lb{color:var(--info-bd)}

pre{background:var(--code-bg);color:var(--code-txt);border-radius:var(--radius);padding:18px 22px;overflow-x:auto;margin:14px 0;font-family:var(--font-mono);font-size:.84rem;line-height:1.65;box-shadow:var(--shadow-sm);tab-size:2}
code{font-family:var(--font-mono);font-size:.86em}
:not(pre)>code{background:var(--card-bg);color:var(--accent);padding:2px 6px;border-radius:3px}
pre code{background:none!important;color:inherit;padding:0;font-size:inherit}
.kw{color:#e06c75}.fn{color:#61afef}.str{color:#98c379}.cm{color:#5c6370;font-style:italic}.num{color:#d19a66}

table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.9rem;box-shadow:var(--shadow-sm)}
thead{background:var(--sidebar-bg);color:#fff}
th{padding:11px 14px;text-align:left;font-weight:600;font-size:.8rem;letter-spacing:.04em}
td{padding:9px 14px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--card-bg)}

.ch-nav{display:flex;justify-content:space-between;margin-top:44px;padding-top:20px;border-top:1px solid var(--border)}
.ch-nav a{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.88rem;transition:all var(--tr);text-decoration:none}
.ch-nav a:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow-sm)}

.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:24px 0}
.toc-card{background:var(--bg-content);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all var(--tr);box-shadow:var(--shadow-sm);text-decoration:none;color:inherit;display:block}
.toc-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.toc-card .toc-num{font-family:var(--font-mono);font-size:.75rem;font-weight:700;color:var(--accent)}
.toc-card h4{font-size:1rem;margin:4px 0 6px;color:var(--head)}
.toc-card p{font-size:.82rem;color:var(--muted);margin:0}

.transition-note{background:linear-gradient(135deg,var(--info-bg),var(--tip-bg));border:1px solid var(--info-bd);border-radius:var(--radius);padding:14px 18px;margin:20px 0;font-size:.9rem}
.transition-note strong{color:var(--accent)}

.practice-box{background:var(--tip-bg);border:2px solid var(--tip-bd);border-radius:var(--radius);padding:18px 22px;margin:20px 0}
.practice-box .pb-title{font-weight:700;font-size:.95rem;color:var(--tip-bd);margin-bottom:10px}

details{margin:16px 0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
details summary{cursor:pointer;padding:14px 18px;background:var(--card-bg);font-weight:600;font-size:.95rem;color:var(--head);user-select:none;list-style:none;display:flex;align-items:center;gap:8px}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▸";display:inline-block;transition:transform .2s;font-size:.8rem;color:var(--accent)}
details[open] summary::before{transform:rotate(90deg)}
details .details-body{padding:16px 18px;border-top:1px solid var(--border);background:var(--bg-content)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:block}
  .main{margin-left:0}
  .content{padding:20px 16px 60px}
  .ch-header h2{font-size:1.45rem}
  .toc-grid{grid-template-columns:1fr}
}
@media print{
  .sidebar,.menu-btn,.ch-nav,.overlay,.theme-btn{display:none}
  .main{margin-left:0}
  .content{max-width:100%;padding:0}
  body{font-size:12pt}
}
#contentArea:empty::after{content:'载入中\u2026';display:block;padding:60px;text-align:center;color:var(--muted);font-size:1.1rem}
</style>
</head>
<body>

<noscript><p>⚠️ 此页面需要 JavaScript 才能正常显示。请启用 JavaScript 后刷新。</p></noscript>

<button class="menu-btn" id="menuBtn" aria-label="菜单">☰</button>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h1>VLA<br>从零到部署</h1>
    <p class="sub">具身智能教科书 · NXROBO</p>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <button class="theme-btn" id="themeToggle">🌙 深色模式</button>
  <div class="sidebar-footer">
    Vision-Language-Action<br>
    MuJoCo · LeRobot · L40 · Gemini
  </div>
</aside>

<main class="main">
  <article class="content" id="contentArea"></article>
</main>

<script>
/* ============================================================
   教科书引擎
   ============================================================ */
(function(){
'use strict';

const CHAPTERS = [
  {id:'ch0',num:'0',title:'课程总览',desc:'VLA 是什么、为什么重要、这门课怎么学。'},
  {id:'ch1',num:'1',title:'VLA 基础与架构',desc:'视觉-语言-动作模型的核心概念、技术演进与系统架构。'},
  {id:'ch2',num:'2',title:'仿真环境搭建',desc:'MuJoCo + LIBERO 仿真平台，为 VLA 实验准备沙盒。'},
  {id:'ch3',num:'3',title:'OpenVLA 实战',desc:'7B 开源 VLA 模型的推理、适配与理解。'},
  {id:'ch4',num:'4',title:'L40 云端训练环境',desc:'SSH 连接、CUDA 配置、依赖管理——为后续训练备好算力。'},
  {id:'ch5',num:'5',title:'SmolVLA 轻量 VLA',desc:'4.5 亿参数，单卡训练，CPU 推理——最亲民的 VLA。'},
  {id:'ch6',num:'6',title:'Pi0 扩散 VLA',desc:'基于扩散模型的 SOTA VLA，理解动作生成的另一种范式。'},
  {id:'ch7',num:'7',title:'Gemini 真机部署',desc:'将云端训练的 VLA 模型部署到双子座机器人上验证。'},
  {id:'ch8',num:'8',title:'VLA 前沿与竞赛',desc:'ACoT-VLA、ManipDojo、ICRA2026——站在最前沿。'},
];

let runOnce = false;

function navHTML(activeId){
  return CHAPTERS.map(c =>
    '<a href="#'+c.id+'"'+(c.id===activeId?' class="active"':'')+' data-ch="'+c.id+'"><span class="num">§'+c.num+'</span> '+c.title+'</a>'
  ).join('');
}

function chNav(currentId){
  const idx = CHAPTERS.findIndex(c => c.id===currentId);
  const prev = idx>0 ? CHAPTERS[idx-1] : null;
  const next = idx<CHAPTERS.length-1 ? CHAPTERS[idx+1] : null;
  return '<div class="ch-nav">'+
    (prev?'<a href="#'+prev.id+'">← §'+prev.num+' '+prev.title+'</a>':'<span></span>')+
    (next?'<a href="#'+next.id+'">§'+next.num+' '+next.title+' →</a>':'<span></span>')+
    '</div>';
}

function render(chapterId){
  const area = document.getElementById('contentArea');
  const ch = CHAPTERS.find(c => c.id===chapterId);
  if(!ch) return renderHome();

  area.innerHTML = '';
  const renderers = {
    ch1: r_ch1, ch2: r_ch2, ch3: r_ch3, ch4: r_ch4,
    ch5: r_ch5, ch6: r_ch6, ch7: r_ch7, ch8: r_ch8
  };
  const fn = renderers[chapterId];
  if(fn){ fn(area,ch); }
  else { area.innerHTML = '<p style="padding:60px;text-align:center;color:var(--muted)">章节内容编写中…</p>'; }

  area.insertAdjacentHTML('beforeend', chNav(chapterId));
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHome(){
  const area = document.getElementById('contentArea');
  document.getElementById('sidebarNav').innerHTML = navHTML('ch0');

  const cards = CHAPTERS.slice(1).map(c =>
    '<a href="#'+c.id+'" class="toc-card"><div class="toc-num">第 '+c.num+' 章</div><h4>'+c.title+'</h4><p>'+c.desc+'</p></a>'
  ).join('');

  area.innerHTML =
    '<div class="ch-header"><div class="ch-num">具身智能 · VLA 专题</div><h2>VLA 从零到部署</h2><p class="ch-desc">Vision-Language-Action · MuJoCo + LeRobot + L40 + Gemini</p></div>'+
    '<div class="callout"><div class="lb">📖 关于本教程</div><p>本教程带你从零开始掌握 <strong>VLA（Vision-Language-Action）</strong>模型——从理论基础、仿真实验、云端训练，到在<strong>双子座 Gemini 机器人</strong>上的真机部署。前置课程：<strong>VLN 视觉语言导航</strong> + <strong>模仿学习（ACT/LeRobot）</strong>。</p><p style="margin-top:8px"><strong>硬件要求</strong>：L40 云端 GPU（训练）+ Gemini 双臂机器人（真机验证）+ 普通电脑（仿真）</p></div>'+
    '<section><h3>🗺️ 学习路线图</h3><p>从 VLA 是什么出发 → 仿真里跑通 OpenVLA → SmolVLA 轻量训练 → Pi0 扩散模型 → 云端分布式训练 → 真机部署验证 → 竞赛实战。一条<strong>从理论到真机</strong>的完整链路。</p>'+
    '<div class="toc-grid">'+cards+'</div></section>'+
    '<section><h3>🛠️ 环境要求</h3><table><thead><tr><th>组件</th><th>要求</th></tr></thead><tbody>'+
    '<tr><td>操作系统</td><td>Ubuntu 20.04/22.04</td></tr>'+
    '<tr><td>Python</td><td>≥ 3.10</td></tr>'+
    '<tr><td>仿真</td><td>MuJoCo ≥ 3.x + LIBERO</td></tr>'+
    '<tr><td>训练</td><td>L40 GPU (48GB) / RTX 4090 (24GB)</td></tr>'+
    '<tr><td>真机</td><td>双子座 Gemini (4 臂 + 移动底盘)</td></tr>'+
    '<tr><td>框架</td><td>LeRobot, PyTorch, HuggingFace</td></tr>'+
    '</tbody></table></section>'+
    '<section><h3>📋 学习节奏</h3><table><thead><tr><th>阶段</th><th>章节</th><th>主要产出</th></tr></thead><tbody>'+
    '<tr><td>第 1 周</td><td>1 + 2</td><td>理解 VLA 架构，跑通 MuJoCo/LIBERO 仿真</td></tr>'+
    '<tr><td>第 2 周</td><td>3</td><td>OpenVLA 推理实战，理解 7B VLA 模型</td></tr>'+
    '<tr><td>第 3 周</td><td>4</td><td>SmolVLA 训练，单卡完成轻量 VLA 微调</td></tr>'+
    '<tr><td>第 4 周</td><td>5 + 6</td><td>Pi0 扩散 VLA + L40 云端分布式训练</td></tr>'+
    '<tr><td>第 5 周</td><td>7 + 8</td><td>Gemini 真机部署 + 竞赛实战</td></tr>'+
    '</tbody></table></section>'+
    '<section style="text-align:center;color:var(--muted);font-size:.85rem;padding:20px 0"><p>🏗️ NXROBO 具身智能课程系列</p><p>📝 License: <a href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a></p></section>';
}

/* ── 路由 ── */
function route(){
  const hash = window.location.hash.slice(1)||'ch0';
  const cid = CHAPTERS.some(c => c.id===hash) ? hash : 'ch0';
  document.getElementById('sidebarNav').innerHTML = navHTML(cid);
  if(cid==='ch0'){ renderHome(); } else { render(cid); }
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  runOnce = true;
}

window.addEventListener('hashchange', ()=>{ if(runOnce) route(); });
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',route); }
else{ route(); }

document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('overlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

const tb = document.getElementById('themeToggle');
tb.addEventListener('click',()=>{
  const d = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');
  tb.textContent=d?'🌙 深色模式':'☀️ 浅色模式';
  try{localStorage.setItem('vla-theme',d?'light':'dark')}catch(e){}
});
try{if(localStorage.getItem('vla-theme')==='dark'){
  document.documentElement.setAttribute('data-theme','dark');
  tb.textContent='☀️ 浅色模式';
}}catch(e){}

/* ============================================================
   第 1 章：VLA 基础与架构
   ============================================================ */
function r_ch1(area,ch){
  area.innerHTML=
    '<div class="transition-note"><strong>🔄 从 VLN 和模仿学习出发</strong> 你已经让机器人在 Habitat 里听懂指令导航（VLN），也让机械臂复现过人类的演示轨迹（模仿学习）。现在把这两条线<strong>拧成一股绳</strong>——用一个统一的大模型同时理解语言、看懂图像、输出动作。</div>'+
    '<div class="ch-header"><div class="ch-num">第 '+ch.num+' 章</div><h2>'+ch.title+'</h2><p class="ch-desc">'+ch.desc+'</p></div>'+
    '<div class="callout tip"><div class="lb">🎯 学习目标</div><ul style="margin:8px 0 0 1.2em;line-height:1.9"><li>理解 VLA 的定义、数学形式，与 VLN / VLM / 模仿学习的本质区别</li><li>掌握 VLA 三模态架构：视觉编码器 → LLM 主干 → 动作预测头</li><li>理解动作离散化的原理（256 桶方案）及其与 LLM Token 的统一</li><li>了解 RT-1→RT-2→OpenVLA→π0 的技术演进和设计取舍</li><li>清楚连续动作 vs 离散动作的工程权衡，以及实时推理的优化手段</li></ul></div>'+
    '<div class="callout"><div class="lb">📍 本章定位</div><p style="margin:0">本章是 VLA 课程的<strong>理论基础</strong>。你已经完成了 VLN（视觉语言导航）和模仿学习（ACT/LeRobot），VLA 是这两条线的交汇——用一个统一的大模型同时理解语言、看懂图像、输出动作。第 3-5 章的 OpenVLA / SmolVLA / Pi0 实战，都建立在本章的概念之上。</p></div>'+

    '<section><h3>1.1 什么是 VLA？</h3>'+
    '<p><strong>视觉-语言-动作模型（Vision-Language-Action Model，VLA）</strong> 是一类将视觉感知、语言理解和机器人动作控制统一集成到同一个神经网络中的端到端模型。与 VLM 仅输出文本不同，VLA 的核心目标是<strong>根据视觉观察和语言指令，直接输出机器人可执行的动作序列</strong>，实现"所见即所动"的具身智能控制。</p>'+
    '<div class="card"><div class="card-label">🔑 一句话定义</div><h5>VLA：图像 + 语言指令 → 动作序列</h5><p>VLM 解决"感知-理解"问题（让机器"看懂"），VLA 解决"感知-理解-执行"问题（让机器"看懂并动手"）。VLA 可以看作在 VLM 的能力基础上，增加了<strong>动作预测</strong>这一关键能力。</p></div>'+
    '<div class="formula formula-block">p(<b>a</b><sub>1:T</sub> | <b>X</b><sub>img</sub>, <b>X</b><sub>text</sub>) = &#x220F;<sub>t=1</sub><sup>T</sup> p(<b>a</b><sub>t</sub> | <b>X</b><sub>img</sub>, <b>X</b><sub>text</sub>, <b>a</b><sub>1:t-1</sub>)</div>'+
    '<p>其中 <b>a</b><sub>t</sub> 为 t 时刻机器人执行的动作，<b>X</b><sub>img</sub> 为视觉观察，<b>X</b><sub>text</sub> 为语言指令。这是一个自回归生成过程——每一步的动作预测都依赖于之前已经执行的动作历史。</p>'+
    '</section>'+

    '<section><h3>1.2 VLA vs VLM vs VLN vs 模仿学习</h3>'+
    '<p>四种让机器人"听懂人话"的范式，本质区别在于<strong>输出模态</strong>和<strong>泛化方式</strong>：</p>'+
    '<table><thead><tr><th>范式</th><th>输入</th><th>输出</th><th>核心思路</th><th>局限</th></tr></thead><tbody>'+
    '<tr><td><strong>VLM</strong></td><td>图像+文本</td><td>文本</td><td>描述/问答/理解场景</td><td>不能控制机器人</td></tr>'+
    '<tr><td><strong>VLN</strong></td><td>全景图+指令</td><td>离散导航动作</td><td>专用模型，只做导航</td><td>任务单一，无法操作</td></tr>'+
    '<tr><td><strong>模仿学习</strong></td><td>图像+本体状态</td><td>连续动作</td><td>从人类演示中学习策略</td><td>每任务需新数据，不利用语言先验</td></tr>'+
    '<tr><td><strong>VLA</strong></td><td>图像+语言+状态</td><td>动作序列</td><td>统一大模型，端到端</td><td>训练成本高，实时性挑战</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">🔑 核心突破</div><h5>VLA = VLN 的语言理解 + 模仿学习的动作能力 + LLM 的世界知识</h5><p>VLA 的核心洞察是：互联网上预训练的大语言模型已经"知道"什么是厨房、杯子、抓取——把它接到机器人上，导航和操作都只是推理能力的延伸。RT-2 的实验证明，这种"知识迁移"能涌现出<strong>零样本视觉推理能力</strong>——识别不通用的物体、读懂表情符号的含义，这些从未在机器人数据中出现过。</p></div>'+
    '</section>'+

    '<section><h3>1.3 VLA 发展历程</h3>'+
    '<p>VLA 经历了从<strong>两阶段独立策略</strong>到<strong>端到端统一策略</strong>的演进：</p>'+
    '<table><thead><tr><th>阶段</th><th>时间</th><th>特征</th><th>代表工作</th></tr></thead><tbody>'+
    '<tr><td><strong>1. 两阶段</strong></td><td>2019-2022</td><td>视觉感知和动作控制分开处理，CLIP+BC 等</td><td>CLIPort, ViLD</td></tr>'+
    '<tr><td><strong>2. 统一</strong></td><td>2022-2023</td><td>RT-1 首次用 Transformer 统一三模态；RT-2 将 VLM 与动作统一训练</td><td>RT-1, RT-2</td></tr>'+
    '<tr><td><strong>3. 开源规模化</strong></td><td>2023-2025</td><td>OpenVLA 开源 7B；π0 扩散动作；SmolVLA 极致轻量</td><td>OpenVLA, π0, SmolVLA</td></tr>'+
    '</tbody></table>'+
    '<table><thead><tr><th>时间</th><th>模型</th><th>机构</th><th>核心贡献</th></tr></thead><tbody>'+
    '<tr><td>2022.7</td><td><strong>RT-1</strong></td><td>Google</td><td>首次用 Transformer 统一视觉-语言-动作</td></tr>'+
    '<tr><td>2023.7</td><td><strong>RT-2</strong></td><td>Google</td><td>VLM+动作统一训练，离散化动作空间</td></tr>'+
    '<tr><td>2024.3</td><td><strong>OpenVLA</strong></td><td>Stanford+UIUC</td><td>开源 7B VLA，HuggingFace 发布</td></tr>'+
    '<tr><td>2024.7</td><td><strong>π0</strong></td><td>Physical Intelligence</td><td>扩散模型生成动作，专为人形机器人设计</td></tr>'+
    '<tr><td>2025</td><td><strong>SmolVLA</strong></td><td>HuggingFace</td><td>450M 参数，消费级 GPU 可训练</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">📈 趋势</div><p>从大而全（RT-2 55B）→ 开源可用（OpenVLA 7B）→ 极致轻量（SmolVLA 450M）。动作生成从<strong>离散分类</strong>（RT-1/RT-2）→ <strong>连续回归+扩散</strong>（π0），精度和泛化能力持续提升。</p></div>'+
    '</section>'+

    '<section><h3>1.4 VLA 核心架构：三模态输入</h3>'+
    '<p>VLA 同时接收<strong>视觉观察</strong>、<strong>语言指令</strong>和<strong>机器人状态（可选）</strong>三种输入：</p>'+
    '<h4>（1）视觉输入</h4>'+
    '<p>来自机器人 RGB/RGB-D 相机，经视觉编码器得到特征序列：</p>'+
    '<div class="formula formula-block"><b>V</b> = VisualEncoder(<b>X</b><sub>img</sub>) = [<b>v</b><sub>1</sub>, <b>v</b><sub>2</sub>, ..., <b>v</b><sub>N</sub>]</div>'+
    '<table><thead><tr><th>编码器</th><th>特点</th><th>代表模型</th></tr></thead><tbody>'+
    '<tr><td><strong>CLIP ViT</strong></td><td>大规模图文预训练，强语义理解</td><td>RT-2</td></tr>'+
    '<tr><td><strong>SigLIP</strong></td><td>CLIP 增强版，对齐能力更强</td><td>OpenVLA</td></tr>'+
    '<tr><td><strong>DINOv2</strong></td><td>自监督 ViT，细粒度视觉特征</td><td>SmolVLA</td></tr>'+
    '</tbody></table>'+
    '<h4>（2）语言输入</h4>'+
    '<p>任务指令（如"拿起红色杯子"），经 LLM 编码为语言 Token。与 VLM 不同，VLA 中的语言输入主要承担<strong>任务指令编码</strong>的作用，而非开放式对话。</p>'+
    '<h4>（3）机器人本体感知（可选）</h4>'+
    '<p>部分 VLA 还会接收本体状态：关节角度 <b>q</b>、末端位姿 <b>p</b>、夹爪开合 g。三者拼接后送入 LLM 统一处理：</p>'+
    '<div class="formula formula-block"><b>F</b><sub>combined</sub> = [<b>V</b>; <b>L</b>; <b>S</b>]</div>'+
    '<pre><code>                     ┌──────────────────────┐\n图像输入 → [视觉编码器] → 视觉 Token 序列 V ─┐\n                                            │\n文本指令 → [LLM Encoder] → 语言 Token ──────┼→ [LLM 主干 Transformer] → 动作 Token\n                                            │\n本体感知 → [状态编码器] → 状态 Token S ─────┘\n                                            ↓\n                               [动作预测头: D 个 256 类分类头]\n                                            ↓\n                                     离散动作索引 → [动作还原] → 连续动作 a<sub>t</sub></code></pre>'+
    '</section>'+

    '<section><h3>1.5 动作空间离散化</h3>'+
    '<p>VLA 的一个核心挑战是：<strong>如何将连续的动作空间与基于 Token 的 LLM 架构融合？</strong></p>'+
    '<p>RT-2 提出的解决方案：将连续动作离散化到 256 个 Token 桶中。假设动作 a ∈ [a<sub>min</sub>, a<sub>max</sub>]：</p>'+
    '<div class="formula formula-block">a<sub>discrete</sub> = Clamp( &#x230A;(a − a<sub>min</sub>) / (a<sub>max</sub> − a<sub>min</sub>) × 255&#x230B;, 0, 255 )</div>'+
    '<p>对于一个 D 维动作向量（如 7-DOF 机械臂），每个维度独立离散化：</p>'+
    '<div class="formula formula-block"><b>a</b><sub>discrete</sub> = [a<sub>1</sub><sup>disc</sup>, a<sub>2</sub><sup>disc</sup>, ..., a<sub>D</sub><sup>disc</sup>]</div>'+
    '<p>推理时还原为连续值：</p>'+
    '<div class="formula formula-block">a<sub>continuous</sub> = a<sub>min</sub> + a<sub>discrete</sub> / 255 × (a<sub>max</sub> − a<sub>min</sub>)</div>'+
    '<table><thead><tr><th>分桶方式</th><th>描述</th><th>优点</th><th>缺点</th></tr></thead><tbody>'+
    '<tr><td><strong>均匀分桶</strong></td><td>动作范围均匀划分 256 桶</td><td>简单直观</td><td>稀疏区间浪费</td></tr>'+
    '<tr><td><strong>数据驱动</strong></td><td>根据数据分布动态定边界</td><td>更精确覆盖分布</td><td>需预分析数据分布</td></tr>'+
    '<tr><td><strong>对数分桶</strong></td><td>取对数后均匀分桶</td><td>覆盖大范围动作</td><td>不适合均匀分布</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">🔑 离散化的核心优势</div><ol style="padding-left:1.5em;line-height:2"><li><strong>与 LLM 统一</strong>：动作 Token 直接复用语言 Token 的建模框架</li><li><strong>语义化</strong>：不同桶可能学到有意义的语义（如"左转"、"右转"）</li><li><strong>多模态建模</strong>：softmax 天然支持多峰动作分布</li></ol></div>'+
    '</section>'+

    '<section><h3>1.6 动作预测头设计</h3>'+
    '<p>动作预测头是 VLA 架构中负责将 LLM 表示转换为具体动作输出的模块。三种常见设计：</p>'+
    '<table><thead><tr><th>类型</th><th>原理</th><th>公式</th><th>代表</th></tr></thead><tbody>'+
    '<tr><td><strong>离散分类头</strong></td><td>每维度 256 类 softmax 分类</td><td>Softmax(<b>W</b><sub>i</sub> · <b>h</b><sub>L</sub>)</td><td>RT-2, OpenVLA</td></tr>'+
    '<tr><td><strong>连续回归头</strong></td><td>MLP 直接回归连续值</td><td><b>w</b><sub>i</sub><sup>T</sup><b>h</b><sub>L</sub> + b<sub>i</sub></td><td>ACT, OpenVLA(混合)</td></tr>'+
    '<tr><td><strong>扩散动作头</strong></td><td>去噪过程逐步生成动作</td><td>ε<sub>θ</sub>(a<sub>t</sub>, t, c)</td><td>π0, Diffusion Policy</td></tr>'+
    '</tbody></table>'+
    '<p>以 RT-2 为例，其动作预测头输出格式为：</p>'+
    '<pre><code>[STOP Token] [Action Dim 1] [Action Dim 2] ... [Action Dim D]\n   1 Token      256 类分类      256 类分类          256 类分类</code></pre>'+
    '<p>每个动作维度对应一个独立的 256 分类头，最终选择概率最高的桶作为该维度的动作预测。</p>'+
    '</section>'+

    '<section><h3>1.7 VLA 训练三阶段</h3>'+
    '<p>VLA 训练通常分为三个阶段，每个阶段的数据和目标各不相同：</p>'+
    '<table><thead><tr><th>阶段</th><th>数据</th><th>目标</th><th>参数策略</th></tr></thead><tbody>'+
    '<tr><td><strong>预训练</strong></td><td>图像-文本对（LAION-2B）</td><td>视觉-语言基础对齐</td><td>对齐模块训练，编码器冻结</td></tr>'+
    '<tr><td><strong>指令微调</strong></td><td>视觉-语言指令数据</td><td>指令跟随、任务理解</td><td>对齐模块 + 指令遵循训练</td></tr>'+
    '<tr><td><strong>动作微调</strong></td><td>机器人演示轨迹（图像+指令+动作标签）</td><td>动作预测能力注入</td><td>视觉微调 + LLM(LoRA) + 动作头全量</td></tr>'+
    '</tbody></table>'+
    '<pre><code>┌─────────────────────────────────────────────────────┐\n│                    预训练阶段                        │\n│  数据: 图像-文本对（LAION-2B 等）                    │\n│  目标: 视觉-语言基础对齐                             │\n│  参数: 对齐模块训练，VL 编码器冻结                    │\n└─────────────────────────────────────────────────────┘\n                          ↓\n┌─────────────────────────────────────────────────────┐\n│                   指令微调阶段                        │\n│  数据: 视觉-语言指令数据（LLaVA-Instruct 等）         │\n│  目标: 指令跟随、任务理解                             │\n│  参数: 对齐模块 + 指令遵循训练                        │\n└─────────────────────────────────────────────────────┘\n                          ↓\n┌─────────────────────────────────────────────────────┐\n│                   动作微调阶段                        │\n│  数据: 机器人演示轨迹（图像 + 指令 + 动作标签）        │\n│  目标: 动作预测能力注入                              │\n│  参数: 视觉编码器微调 + LLM(LoRA) + 动作预测头        │\n└─────────────────────────────────────────────────────┘\n                          ↓\n                      完整 VLA 模型</code></pre>'+
    '<div class="callout warn"><div class="lb">⚠️ 动作微调是关键</div><p style="margin:0">前两阶段本质上和训练一个 VLM 没有区别。第 3 阶段才是 VLA 与 VLM 的<strong>本质分水岭</strong>——模型第一次见到"图像 + 指令 → 动作"的配对数据。OpenVLA 采用的策略是：<strong>视觉编码器全量微调 + LLM 使用 LoRA + 动作头全量训练</strong>。</p></div>'+
    '</section>'+

    '<section><h3>1.8 连续动作 vs 离散动作</h3>'+
    '<p>VLA 在处理动作空间时面临一个根本性选择：</p>'+
    '<table><thead><tr><th>维度</th><th>连续动作</th><th>离散动作</th></tr></thead><tbody>'+
    '<tr><td><strong>动作精度</strong></td><td>高（任意精度）</td><td>受桶数量限制</td></tr>'+
    '<tr><td><strong>动作空间覆盖</strong></td><td>自然覆盖</td><td>可能存在稀疏区间</td></tr>'+
    '<tr><td><strong>多峰分布</strong></td><td>需要混合模型</td><td>softmax 天然支持</td></tr>'+
    '<tr><td><strong>与 LLM 融合</strong></td><td>需要额外设计</td><td>直接复用 Token 框架</td></tr>'+
    '<tr><td><strong>代表工作</strong></td><td>ACT, π0</td><td>RT-2, OpenVLA</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">📈 行业趋势</div><p>2025 年后，<strong>扩散式连续动作生成</strong>（π0 路线）正在成为主流。它兼具连续动作的高精度和概率建模的多峰能力，是本课程第 5 章的重点。</p></div>'+
    '</section>'+

    '<section><h3>1.9 实时性要求与推理优化</h3>'+
    '<p>机器人控制对实时性有严格要求，VLA 推理延迟是实际部署中的关键瓶颈：</p>'+
    '<table><thead><tr><th>应用场景</th><th>控制频率</th><th>延迟容忍度</th></tr></thead><tbody>'+
    '<tr><td>工业装配</td><td>500Hz-1kHz</td><td>&lt;2ms</td></tr>'+
    '<tr><td>动态操作</td><td>50-100Hz</td><td>&lt;20ms</td></tr>'+
    '<tr><td>日常家务</td><td>10-30Hz</td><td>&lt;100ms</td></tr>'+
    '<tr><td>任务规划</td><td>1-5Hz</td><td>&lt;1s</td></tr>'+
    '</tbody></table>'+
    '<h4>推理延迟构成</h4>'+
    '<table><thead><tr><th>阶段</th><th>OpenVLA (7B)</th><th>RT-2 (55B)</th></tr></thead><tbody>'+
    '<tr><td>视觉编码</td><td>~10ms</td><td>~30ms</td></tr>'+
    '<tr><td>LLM 前向传播</td><td>~30ms (INT4)</td><td>~500ms (FP16)</td></tr>'+
    '<tr><td><strong>总延迟</strong></td><td><strong>~40ms (25Hz)</strong></td><td><strong>~530ms (~2Hz)</strong></td></tr>'+
    '</tbody></table>'+
    '<h4>五大优化手段</h4>'+
    '<ol style="padding-left:1.5em;line-height:2.2"><li><strong>模型量化</strong>：INT8 降 30-40% 延迟，INT4 降 50-60%，可运行于消费级 GPU</li><li><strong>模型蒸馏</strong>：大模型 Teacher → 小模型 Student，OpenVLA-3B 比 7B 快 2 倍</li><li><strong>推测解码</strong>：小模型预测动作，大模型验证</li><li><strong>异步执行</strong>：控制与推理解耦，MPC 与 VLA 协同</li><li><strong>动作缓存</strong>：静态场景缓存预测，避免重复推理</li></ol>'+
    '</section>'+

    '<section><h3>1.10 本课程选型理由</h3>'+
    '<p>本课程围绕三款 VLA 模型展开，选择逻辑如下：</p>'+
    '<table><thead><tr><th>模型</th><th>参数</th><th>为什么选它</th><th>在哪练</th></tr></thead><tbody>'+
    '<tr><td><strong>OpenVLA</strong></td><td>7B</td><td>开源标杆，文档完善，学术界基准</td><td>第 3 章 · 仿真推理</td></tr>'+
    '<tr><td><strong>SmolVLA</strong></td><td>450M</td><td>极致轻量，L40 单卡训练，成本最低</td><td>第 4 章 · 云端训练</td></tr>'+
    '<tr><td><strong>π0</strong></td><td>~3B</td><td>扩散 VLA 代表，SOTA 性能，理解新范式</td><td>第 5 章 · L40 训练</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">🔑 学习路线</div><p>先用 OpenVLA 理解 VLA 推理（第 3 章）→ 用 SmolVLA 上手训练（第 4 章）→ 用 π0 接触前沿扩散范式（第 5 章）→ 云端训练实战（第 6 章）→ 真机部署（第 7 章）。<strong>从推理到训练，从仿真到真机，从经典到前沿。</strong></p></div>'+
    '</section>'+

    '<section><h3>1.11 VLA 的能力边界</h3>'+

    '<tr><td><strong>训练数据</strong></td><td>Open X-Embodiment (2M+ 轨迹)</td><td>内部数据 (13 台机器人, 17 个月)</td></tr>'+
    '<tr><td><strong>推理速度</strong></td><td>~40ms (INT4, 25Hz)</td><td>~530ms (FP16, ~2Hz)</td></tr>'+
    '<tr><td><strong>开源</strong></td><td>✅ Apache 2.0</td><td>❌ 闭源</td></tr>'+
    '</tbody></table>'+
    '<div class="card"><div class="card-label">🔑 核心创新</div><p>OpenVLA 证明了<strong>开源 LLM（LLaMA 2）可以直接做 VLA 的基座</strong>，不需要 Google 的闭源模型。7B 参数经过 INT4 量化后仅需 ~5GB 显存，可以在消费级 GPU（RTX 3090/4060）上推理。这也是本课程选它的原因——<strong>你能在自己的硬件上跑起来</strong>。</p></div>'+
    '</section>'+

    '<section><h3>3.2 OpenVLA 架构详解</h3>'+
    '<p>OpenVLA 遵循"视觉编码器 → 语言基座 → 动作头"三阶段范式，与 §1 讲的理论架构完全对应：</p>'+
    '<pre><code>┌──────────────────────────────────────────────────────┐\n│  📷 RGB 图像 (224×224×3)                              │\n│        ↓                                              │\n│  SigLIP ViT-SO (384M)                                │\n│  将图像切为 14×14 = 196 个 patch，输出 196×1024 特征   │\n│        ↓                                              │\n│  ┌─────────────────────────────────────────┐         │\n│  │  Projector: 1024 → 4096 (LLaMA 维度)    │         │\n│  └─────────────────────────────────────────┘         │\n│        ↓                                              │\n│  ┌─────────────────────────────────────────┐         │\n│  │  LLaMA 2 7B (32 层, 4096 hidden)        │         │\n│  │  · 196 个视觉 token + N 个语言 token    │         │\n│  │  · 自回归生成 8 个动作 token             │         │\n│  └─────────────────────────────────────────┘         │\n│        ↓                                              │\n│  ┌─────────────────────────────────────────┐         │\n│  │  Action Head: 每个 token → 256 类分类   │         │\n│  │  7 个动作维 × 256 桶 → 7 个离散索引     │         │\n│  └─────────────────────────────────────────┘         │\n│        ↓                                              │\n│  🦾 连续动作: (Δx, Δy, Δz, Δroll, Δpitch, Δyaw, g)  │\n└──────────────────────────────────────────────────────┘</code></pre>'+
    '<h4>三个组件的分工</h4>'+
    '<table><thead><tr><th>组件</th><th>模型</th><th>参数量</th><th>作用</th></tr></thead><tbody>'+
    '<tr><td><strong>视觉编码器</strong></td><td>SigLIP ViT-SO</td><td>~384M</td><td>RGB → 196 个 1024 维视觉 token</td></tr>'+
    '<tr><td><strong>投影层</strong></td><td>Linear(1024→4096)</td><td>~4M</td><td>视觉维度 → LLaMA 维度对齐</td></tr>'+
    '<tr><td><strong>语言基座</strong></td><td>LLaMA 2 7B</td><td>~6.7B</td><td>融合视觉+语言 → 自回归生成动作 token</td></tr>'+
    '<tr><td><strong>动作头</strong></td><td>7 个独立 Linear(4096→256)</td><td>~7M</td><td>每个 token → 256 桶概率 → 连续动作值</td></tr>'+
    '</tbody></table>'+
    '</section>'+

    '<section><h3>3.3 模型下载与加载</h3>'+
    '<p>OpenVLA 模型托管在 HuggingFace，约 14GB（FP16）。国内下载可能需要镜像：</p>'+
    '<pre><code># 方案 A：直接下载（推荐，国外网络或代理）\npip install transformers>=4.40 torch>=2.0 accelerate\n\n# 方案 B：HF 镜像（国内网络）\nexport HF_ENDPOINT=https://hf-mirror.com\npip install transformers torch accelerate\n\n# 方案 C：L40 云端（第 6 章）\n# L40 位于海外机房，直连 HuggingFace，无需镜像</code></pre>'+
    '<h4>加载模型（FP16）</h4>'+
    '<pre><code>import torch\nfrom transformers import AutoModelForVision2Seq, AutoProcessor\n\nmodel_id = "openvla/openvla-7b"\n\n# FP16 加载（需 ~14GB 显存）\nmodel = AutoModelForVision2Seq.from_pretrained(\n    model_id,\n    torch_dtype=torch.float16,\n    device_map="auto",          # 自动分配 GPU/CPU\n    trust_remote_code=True,     # OpenVLA 有自定义代码\n)\nprocessor = AutoProcessor.from_pretrained(model_id)\n\nprint("模型加载完成！")</code></pre>'+
    '<h4>INT4 量化加载（消费级 GPU）</h4>'+
    '<pre><code># INT4 量化（需 ~8GB 显存，RTX 4060 / 3090 可用）\nfrom transformers import BitsAndBytesConfig\n\nquant_config = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_compute_dtype=torch.float16,\n    bnb_4bit_use_double_quant=True,\n)\n\nmodel = AutoModelForVision2Seq.from_pretrained(\n    model_id,\n    quantization_config=quant_config,\n    device_map="auto",\n    trust_remote_code=True,\n)</code></pre>'+
    '<div class="callout warn"><div class="lb">⚠️ 硬件要求</div><ul style="margin:8px 0 0 1.2em;line-height:1.9"><li><strong>FP16</strong>：~14GB 显存 — RTX 3090/4090, A100, L40</li><li><strong>INT8</strong>：~8GB 显存 — RTX 3070/4060, V100</li><li><strong>INT4</strong>：~5GB 显存 — RTX 2060/3060, T4</li><li><strong>CPU</strong>：理论上可行（~64GB RAM），推理速度 ~2-5 秒/步，不推荐</li></ul></div>'+
    '</section>'+

    '<section><h3>3.4 推理管线：从像素到关节角</h3>'+
    '<p>一次完整的 OpenVLA 推理包含四个步骤。理解每一步，你就能在任何机器人平台上适配它：</p>'+
    '<h4>步骤 1：图像预处理</h4>'+
    '<pre><code>from PIL import Image\nimport numpy as np\n\n# LIBERO 返回的 RGB 数组 (224, 224, 3) uint8\nobs = env.reset()  # numpy uint8\nimage = Image.fromarray(obs).convert("RGB")\n\n# 可选：反归一化到 [0,1]（OpenVLA processor 会自动处理）</code></pre>'+
    '<h4>步骤 2：构建 Prompt</h4>'+
    '<pre><code># OpenVLA 使用特殊格式编码任务指令\n# 格式: "Task: {instruction}. Bot: In: Im"\ninstruction = task.language_instruction\nprompt = f"Task: {instruction}. Bot: In: Im"\n\n# processor 自动将 "Im" 替换为图像 token\ninputs = processor(\n    images=image,\n    text=prompt,\n    return_tensors="pt",\n).to(model.device)</code></pre>'+
    '<h4>步骤 3：模型前向推理</h4>'+
    '<pre><code>with torch.no_grad():\n    # 自回归生成 8 个 token（7 动作 + 1 结束符）\n    outputs = model.generate(\n        **inputs,\n        max_new_tokens=8,\n        do_sample=False,          # 贪心解码 = 确定性输出\n        num_beams=1,\n    )\n\n# 提取新生成的 token\naction_tokens = outputs[:, inputs["input_ids"].shape[1]:]\n# shape: (1, 8)</code></pre>'+
    '<h4>步骤 4：Token → 连续动作</h4>'+
    '<pre><code># OpenVLA 的 action head 是 7 个 Linear(4096, 256) 分类头\n# generate 的输出 token ID 就是每个维度的桶索引 (0~255)\n\ndef decode_action(action_tokens, num_bins=256):\n    """\n    将离散 token 恢复为连续动作值\n    \n    action_tokens: (1, 8) — 最后一个是结束符，忽略\n    返回: (7,) numpy array, 范围 [-1, 1]\n    """\n    token_ids = action_tokens[0, :7].cpu().numpy()  # 取前 7 个\n    \n    actions = []\n    for tid in token_ids:\n        # 256 桶均匀分布在 [-1, 1]\n        bin_centers = np.linspace(-1.0, 1.0, num_bins)\n        action_value = bin_centers[tid % num_bins]\n        actions.append(action_value)\n    \n    return np.array(actions)</code></pre>'+
    '<div class="card"><div class="card-label">🔑 理解 token → 动作的映射</div><p>假设第 0 维（Δx）的 token ID = 150，256 桶均匀分布在 [-1, 1]：桶 150 的中心 = -1.0 + (150/255) × 2.0 = <strong>+0.176</strong>。这个值就是机械臂末端在 x 方向的增量。ID=0 → -1.0（向左最快），ID=255 → +1.0（向右最快），ID=128 → ~0.0（不动）。</p></div>'+
    '</section>'+

    '<section><h3>3.5 完整推理闭环：OpenVLA + LIBERO</h3>'+
    '<p>把上面的推理管线嵌入 LIBERO 控制循环，替换 §2 的随机动作：</p>'+
    '<div class="practice-box"><div class="pb-title">🧪 OpenVLA 零样本推理实验</div><ol class="steps"><li><strong>确认环境</strong>：<code>cd /develop/vla-course/codes && uv run python -c "from transformers import AutoModelForVision2Seq; print(\'OK\')"</code></li><li><strong>下载模型</strong>（首次约 14GB）：运行下方脚本会自动从 HuggingFace 拉取</li><li><strong>运行推理</strong>：<code>uv run python codes/step3_openvla/run_openvla_libero.py</code></li><li><strong>观察</strong>：终端打印每步动作，注意 gripper 值在接近物体时从 1.0（开）变为 -1.0（关）</li></ol></div>'+
    '<details><summary>展开查看 run_openvla_libero.py 完整代码</summary><div class="details-body"><pre><code>#!/usr/bin/env python3\n"""OpenVLA 7B + LIBERO-Spatial 零样本推理闭环"""\nimport torch\nimport numpy as np\nfrom PIL import Image\nfrom transformers import AutoModelForVision2Seq, AutoProcessor\nfrom libero.libero import benchmark\n\n# ===== 1. 加载模型 =====\nDEVICE = "cuda" if torch.cuda.is_available() else "cpu"\nMODEL_ID = "openvla/openvla-7b"\n\nprint(f"加载 OpenVLA 到 {DEVICE}...")\nmodel = AutoModelForVision2Seq.from_pretrained(\n    MODEL_ID,\n    torch_dtype=torch.float16 if DEVICE == "cuda" else torch.float32,\n    device_map="auto",\n    trust_remote_code=True,\n)\nprocessor = AutoProcessor.from_pretrained(MODEL_ID)\n\n# ===== 2. 加载 LIBERO 任务 =====\nbenchmark_dict = benchmark.get_benchmark_dict()\ntask_suite = benchmark_dict["libero_spatial"]()\ntask = task_suite.get_task(0)\n\nenv_args = {\n    "task": task,\n    "bddl_file": task.bddl_file,\n    "camera_heights": 224,\n    "camera_widths": 224,\n}\nenv = task_suite.get_env(task_id=0, env_args=env_args)\n\nprint(f"\n任务: {task.name}")\nprint(f"指令: {task.language_instruction}")\n\n# ===== 3. 推理循环 =====\nNUM_BINS = 256\nBIN_CENTERS = np.linspace(-1.0, 1.0, NUM_BINS)\n\nobs = env.reset()\nmax_steps = 30\n\nfor step in range(max_steps):\n    # ── 图像预处理 ──\n    image = Image.fromarray(obs).convert("RGB")\n\n    # ── 构建 prompt ──\n    prompt = f"Task: {task.language_instruction}. Bot: In: Im"\n\n    # ── 模型推理 ──\n    inputs = processor(\n        images=image,\n        text=prompt,\n        return_tensors="pt",\n    ).to(DEVICE)\n\n    with torch.no_grad():\n        outputs = model.generate(\n            **inputs,\n            max_new_tokens=8,\n            do_sample=False,\n        )\n\n    # ── Token → 连续动作 ──\n    new_tokens = outputs[0, inputs["input_ids"].shape[1]:]\n    action = np.array([\n        BIN_CENTERS[new_tokens[i].item() % NUM_BINS]\n        for i in range(7)\n    ])\n\n    # ── 执行动作 ──\n    obs, reward, done, info = env.step(action)\n\n    if step % 5 == 0 or done:\n        d = action\n        print(f"Step {step:2d} | Δxyz=({d[0]:+.3f},{d[1]:+.3f},{d[2]:+.3f}) "\n              f"| Δrpy=({d[3]:+.3f},{d[4]:+.3f},{d[5]:+.3f}) "\n              f"| gripper={d[6]:+.3f} | reward={reward:.2f}")\n\n    if done:\n        print(f"\n✅ 任务完成于 step {step}")\n        break\n\nprint("\n推理结束。")\nprint(f"零样本成功率 = {1.0 if done else 0.0} (1 个任务)")\nprint("提示: 运行全部 10 个 LIBERO-Spatial 任务来统计真正的成功率")</code></pre></div></details>'+
    '<div class="callout"><div class="lb">💡 预期结果</div><p style="margin:0">OpenVLA 在 LIBERO-Spatial 10 个任务上的零样本成功率约 <strong>60-80%</strong>。简单任务（把碗放到盘子上）几乎 100%，复杂任务（把字母方块放进烤面包机）可能失败。失败不代表模型"不懂"——可能是指令歧义、视觉遮挡、或动作精度不够。</p></div>'+
    '</section>'+

    '<section><h3>3.6 理解输出：动作是如何"算"出来的？</h3>'+
    '<p>你已经看了 token→action 的代码，但背后有一个关键问题：<strong>LLaMA 输出的 token ID，和 256 桶的桶索引是什么关系？</strong></p>'+
    '<p>OpenVLA 的做法非常巧妙：</p>'+
    '<ol style="padding-left:1.5em;line-height:2.2"><li>LLaMA 的词表有 32000 个 token（正常的文本 token）</li><li>OpenVLA 额外加了 <strong>7×256 = 1792 个"动作 token"</strong> 到词表中</li><li>这些动作 token 的 ID 范围是 [32000, 33792)</li><li>token ID = 32000 + dim_idx × 256 + bucket_idx</li><li>所以 token ID 除以 256 的商是<strong>维度索引</strong>，余数是<strong>桶索引</strong></li></ol>'+
    '<table><thead><tr><th>Token ID</th><th>含义</th><th>维度</th><th>桶索引</th><th>连续值</th></tr></thead><tbody>'+
    '<tr><td>32000</td><td>Δx 第 0 桶</td><td>0 (Δx)</td><td>0</td><td>-1.0 (向左最快)</td></tr>'+
    '<tr><td>32128</td><td>Δx 第 128 桶</td><td>0 (Δx)</td><td>128</td><td>~0.0 (不动)</td></tr>'+
    '<tr><td>32255</td><td>Δx 第 255 桶</td><td>0 (Δx)</td><td>255</td><td>+1.0 (向右最快)</td></tr>'+
    '<tr><td>33536</td><td>gripper 第 128 桶</td><td>6 (gripper)</td><td>128</td><td>~0.0 (半开)</td></tr>'+
    '</tbody></table>'+
    '<p>这就是 §1.5 讲的"动作离散化与 LLM Token 统一"在 OpenVLA 中的具体实现。LLaMA 的损失函数、注意力机制、自回归生成——全部原封不动地复用了语言模型的框架。</p>'+
    '</section>'+

    '<section><h3>📝 本章小结</h3><div class="card"><div class="card-label">带走这几条</div><ol style="padding-left:1.5em;line-height:2.1"><li><strong>OpenVLA = SigLIP ViT + LLaMA 2 7B + 7×256 动作头</strong></li><li><strong>推理管线</strong>：图像 → ViT 编码 → 196 个视觉 token + 语言 token → LLaMA 自回归 → 8 个动作 token → 桶解码 → 7 维连续动作</li><li><strong>Token→Action</strong>：Token ID 的商=维度索引，余数=256 桶索引，桶中心 = -1 + 索引/255×2</li><li><strong>INT4 量化</strong>：7B 模型 → ~5GB 显存，RTX 2060 也能跑，推理 ~40-80ms/步</li><li><strong>零样本能力</strong>：OpenVLA 在 LIBERO 上无需微调即可获得 60-80% 成功率</li></ol></div>'+

    '<h4>🤔 思考题</h4><ol style="padding-left:1.5em;line-height:2.2"><li>OpenVLA 的 token ID 编码方案中，为什么能用"商=维度"、"余数=桶"？这要求 256 和 7 满足什么数学条件？</li><li>如果想让 OpenVLA 控制一个 14-DOF 的双臂机器人（7+7），token 编码方案需要怎么改？</li><li>INT4 量化会损失什么？在 §3.5 的 LIBERO 实验中，如果你跑 FP16 和 INT4 推理各 10 次，预期成功率会有差异吗？为什么？</li></ol>';
}

    '<section><h3>4.3 硬件与环境概览</h3>'+
    '<p>登录 L40 后，先确认硬件配置：</p>'+
    '<pre><code># 查看 GPU\nnvidia-smi\n# 应输出: NVIDIA L40, 46068 MiB\n\n# 查看 CUDA 版本\nnvcc --version\n# 应输出: CUDA 12.x\n\n# 查看磁盘\n# 工程路径: /root/gpufree-data/habitat-lab-edu/（PVC 持久化）\ndf -h /root/gpufree-data</code></pre>'+
    '<p>L40 的核心硬件配置：</p>'+
    '<table><thead><tr><th>硬件</th><th>规格</th></tr></thead><tbody>'+
    '<tr><td><strong>GPU</strong></td><td>NVIDIA L40, 48GB 显存, Ada Lovelace 架构</td></tr>'+
    '<tr><td><strong>CUDA</strong></td><td>12.x</td></tr>'+
    '<tr><td><strong>CPU</strong></td><td>Intel Xeon, ~16 vCPU</td></tr>'+
    '<tr><td><strong>RAM</strong></td><td>60GB+</td></tr>'+
    '<tr><td><strong>磁盘</strong></td><td>PVC 持久化存储, /root/gpufree-data/</td></tr>'+
    '</tbody></table>'+
    '<div class="callout"><div class="lb">📍 PVC 持久化存储</div><p style="margin:0">L40 的 <code>/root/gpufree-data/</code> 是 PVC 持久化卷——<strong>关机不会丢数据</strong>。训练 checkpoints、下载的模型权重、实验代码都应该放在这个目录下。但注意：<strong>Git 提交还是要 push</strong>——PVC 是本机的持久化，不是远程备份。</p></div>'+
    '</section>'+

    '<section><h3>4.4 Python 环境配置</h3>'+
    '<p>L40 上已有 Python 3.9 环境和 CUDA。本章用 <strong>uv</strong> 管理项目依赖，与本机 §2 的配置保持一致：</p>'+
    '<pre><code># L40 上执行（首次配置）\n# 1. 确认 Python\npython3 --version  # Python 3.9.x\n\n# 2. 安装 uv（如果没有）\ncurl -LsSf https://astral.sh/uv/install.sh | sh\nsource ~/.cargo/env\n\n# 3. 创建 vla-course 工程目录\nmkdir -p /root/gpufree-data/vla-course\ncd /root/gpufree-data/vla-course\n\n# 4. 初始化 uv 项目\nuv init\n\n# 5. 安装 PyTorch（CUDA 12.x）\nuv pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121\n\n# 6. 安装 VLA 训练核心依赖\nuv pip install transformers accelerate datasets\nuv pip install peft bitsandbytes  # LoRA + 量化</code></pre>'+
    '<h4>验证 GPU 可用</h4>'+
    '<pre><code>uv run python -c "\nimport torch\nprint(f\'PyTorch: {torch.__version__}\')\nprint(f\'CUDA available: {torch.cuda.is_available()}\')\nprint(f\'GPU: {torch.cuda.get_device_name(0)}\')\nprint(f\'VRAM: {torch.cuda.get_device_properties(0).total_mem / 1024**3:.1f} GB\')\n"\n# 预期输出:\n# PyTorch: 2.x.x\n# CUDA available: True\n# GPU: NVIDIA L40\n# VRAM: 44.3 GB</code></pre>'+
    '</section>'+

    '<section><h3>4.5 文件传输：本机 ↔ L40</h3>'+
    '<p>课程代码在本机开发，训练在 L40 上跑。需要可靠的文件同步方案：</p>'+
    '<pre><code># 方式 1：scp（单文件/小目录）\n# 本机 → L40\nscp -P 30334 /develop/vla-course/codes/step5_smolvla/train.py root@120.209.70.195:/root/gpufree-data/vla-course/\n\n# L40 → 本机（下载 checkpoint）\nscp -P 30334 root@120.209.70.195:/root/gpufree-data/vla-course/ckpt/best.pt /develop/vla-course/ckpt/</code></pre>'+
    '<pre><code># 方式 2：rsync（大目录、增量同步、推荐）\n# 本机 → L40（只传变化的文件）\nrsync -avz -e "ssh -p 30334" \\\n  /develop/vla-course/codes/ \\\n  root@120.209.70.195:/root/gpufree-data/vla-course/codes/\n\n# L40 → 本机（下载训练产物）\nrsync -avz -e "ssh -p 30334" \\\n  root@120.209.70.195:/root/gpufree-data/vla-course/outputs/ \\\n  /develop/vla-course/outputs/</code></pre>'+
    '<div class="card"><div class="card-label">🔑 scp vs rsync</div><p><strong>scp</strong> 适合传单个文件（模型权重、checkpoint）。<strong>rsync</strong> 适合同步整个目录（代码、数据集），只传变化的文件，中断后可续传。课程后续的"本机编辑 → rsync 推送 → L40 训练 → rsync 拉回"工作流基于 rsync。</p></div>'+
    '</section>'+

    '<section><h3>4.6 tmux：让训练在后台跑</h3>'+
    '<p>训练 SmolVLA 需要 ~6 小时，Pi0 需要 ~20 小时。SSH 断开会导致前台进程被杀。<strong>tmux</strong> 让训练会话在后台持久运行：</p>'+
    '<pre><code># 创建新会话\nssh l40\ntmux new -s train\n\n# 在 tmux 里启动训练\ncd /root/gpufree-data/vla-course\nuv run python codes/step5_smolvla/train.py\n\n# 断开 tmux（训练继续在后台跑）\nCtrl+B, D\n\n# 重新连接\ntmux attach -t train\n\n# 查看所有会话\ntmux ls</code></pre>'+
    '<h4>tmux 常用快捷键</h4>'+
    '<table><thead><tr><th>操作</th><th>快捷键</th></tr></thead><tbody>'+
    '<tr><td>断开会话</td><td><code>Ctrl+B, D</code></td></tr>'+
    '<tr><td>新建窗口</td><td><code>Ctrl+B, C</code></td></tr>'+
    '<tr><td>切换窗口</td><td><code>Ctrl+B, 0-9</code></td></tr>'+
    '<tr><td>上下滚动</td><td><code>Ctrl+B, [</code> 然后方向键</td></tr>'+
    '<tr><td>水平分屏</td><td><code>Ctrl+B, "</code></td></tr>'+
    '<tr><td>垂直分屏</td><td><code>Ctrl+B, %</code></td></tr>'+
    '</tbody></table>'+
    '</section>'+

    '<section><h3>4.7 GPU 监控：实时看显存和利用率</h3>'+
    '<p>训练中需要监控 GPU 状态——显存是否 OOM、利用率是否打满：</p>'+
    '<pre><code># 基础监控（实时刷新）\nwatch -n 1 nvidia-smi\n\n# 更详细的监控（推荐安装 gpustat）\nuv pip install gpustat\ngpustat -i 1  # 每秒刷新\n\n# 输出示例:\n# [0] NVIDIA L40 | 48°C,  85% utilization,  32768 / 46068 MB\n#     pid 12345: python train.py  (32600 MB)</code></pre>'+
    '<div class="callout warn"><div class="lb">⚠️ 训练中关注</div><ul style="margin:8px 0 0 1.2em;line-height:1.9"><li><strong>显存 (Memory)</strong>：接近 44GB 红线时减小 batch_size</li><li><strong>利用率 (Utilization)</strong>：应该 > 80%，如果 < 50% 可能是数据加载瓶颈</li><li><strong>温度 (Temp)</strong>：L40 正常在 50-70°C，超过 80°C 检查散热</li></ul></div>'+
    '</section>'+

    '<section><h3>4.8 动手实验：初始化 L40 训练环境</h3>'+
    '<div class="practice-box"><div class="pb-title">🧪 把 L40 环境从头配好</div><ol class="steps"><li><strong>SSH 登录</strong>：<code>ssh -p 30334 root@120.209.70.195</code></li><li><strong>创建工程目录</strong>：<code>mkdir -p /root/gpufree-data/vla-course && cd /root/gpufree-data/vla-course</code></li><li><strong>初始化 uv</strong>：<code>uv init && uv pip install torch --index-url https://download.pytorch.org/whl/cu121</code></li><li><strong>验证 GPU</strong>：<code>uv run python -c "import torch; print(torch.cuda.get_device_name(0))"</code></li><li><strong>启动 tmux</strong>：<code>tmux new -s test</code></li><li><strong>运行 GPU 压测</strong>：<code>uv run python codes/step4_l40/gpu_test.py</code></li></ol></div>'+
    '<details><summary>展开查看 gpu_test.py（GPU 基准测试脚本）</summary><div class="details-body"><pre><code>#!/usr/bin/env python3\n"""L40 GPU 基准测试 - 验证环境可用、测试算力上限"""\nimport torch\nimport time\n\nprint("=" * 50)\nprint("L40 GPU 基准测试")\nprint("=" * 50)\n\n# 1. 基本信息\nprint(f"\\nPyTorch: {torch.__version__}")\nprint(f"CUDA available: {torch.cuda.is_available()}")\nprint(f"GPU: {torch.cuda.get_device_name(0)}")\n\nprops = torch.cuda.get_device_properties(0)\nprint(f"VRAM: {props.total_mem / 1024**3:.1f} GB")\nprint(f"Compute Capability: {props.major}.{props.minor}")\nprint(f"CUDA Cores: {props.multi_processor_count} SM")\n\n# 2. 矩阵乘法算力测试\nprint("\\n--- 矩阵乘法算力测试 ---")\nfor size in [1024, 2048, 4096, 8192]:\n    a = torch.randn(size, size, device="cuda", dtype=torch.float16)\n    b = torch.randn(size, size, device="cuda", dtype=torch.float16)\n    \n    # 预热\n    for _ in range(5):\n        torch.matmul(a, b)\n    torch.cuda.synchronize()\n    \n    # 计时\n    start = time.time()\n    for _ in range(20):\n        torch.matmul(a, b)\n    torch.cuda.synchronize()\n    elapsed = time.time() - start\n    \n    tflops = 2 * size**3 * 20 / elapsed / 1e12\n    print(f"  {size}x{size} matmul: {elapsed/20*1000:.1f}ms ({tflops:.1f} TFLOPS)")\n\n# 3. 可用显存测试\nprint("\\n--- 显存测试 ---")\nfor frac in [0.25, 0.5, 0.75, 0.9]:\n    try:\n        total = torch.cuda.get_device_properties(0).total_mem\n        size = int(total * frac) // 4  # float32\n        x = torch.zeros(size, device="cuda")\n        used = torch.cuda.memory_allocated() / 1024**3\n        print(f"  分配 {frac*100:.0f}% 显存: {used:.1f} GB OK")\n        del x\n        torch.cuda.empty_cache()\n    except RuntimeError as e:\n        print(f"  分配 {frac*100:.0f}% 显存: OOM")\n\nprint("\\nGPU 基准测试完成！")\nprint("L40 环境已就绪，可以开始下一步训练。")</code></pre></div></details>'+
    '<p>跑通这个实验后，L40 环境就完整配置好了。§5 的 SmolVLA 训练脚本直接 scp 上去就能跑。</p>'+
    '</section>'+

    '<section><h3>📝 本章小结</h3><div class="card"><div class="card-label">带走这几条</div><ol style="padding-left:1.5em;line-height:2.1"><li><strong>L40 的 44GB 显存</strong>恰好覆盖 SmolVLA (16-24GB) 和 Pi0 (30-40GB) 的训练需求</li><li><strong>SSH 免密 + config 别名</strong>：一行 <code>ssh l40</code> 连接，不输密码</li><li><strong>PVC 持久化</strong>：<code>/root/gpufree-data/</code> 关机不丢数据，checkpoint 放这里</li><li><strong>uv 统一管理</strong>：本机和 L40 用同一套依赖方案，避免版本差异</li><li><strong>rsync + tmux</strong>：代码推送 → tmux 后台训练 → 断开 SSH → 过几小时回来收结果</li></ol></div>'+

    '<h4>🤔 思考题</h4><ol style="padding-left:1.5em;line-height:2.2"><li>如果把 gpu_test.py 在 RTX 4060 (8GB) 上跑，哪个显存分配比例会 OOM？</li><li>rsync 和 scp 都可以传文件——如果一个 10GB 的模型权重已传到 L40 上，你又微调了一下训练脚本（5KB），用什么命令只更新脚本？</li><li>tmux 断开后训练继续跑——但如果你重启了 L40（关机再开机），tmux 会话还在吗？怎么办？</li></ol>';
}
