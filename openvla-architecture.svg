<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 520">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="grad-vision" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-language" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- STAGE 1: 视觉编码 -->
  <rect x="15" y="55" width="400" height="240" rx="10" fill="url(#grad-vision)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="25" y="75" fill="#22d3ee" font-size="10" font-weight="600" font-family="sans-serif">阶段 1 · 视觉编码</text>
  <text x="25" y="90" fill="#475569" font-size="8" font-family="sans-serif">SigLIP ViT-SO (384M)</text>

  <!-- RGB Image Input -->
  <rect x="35" y="170" width="105" height="70" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="87" y="195" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">📷 RGB Image</text>
  <text x="87" y="213" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">224×224×3</text>
  <text x="87" y="228" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">uint8 numpy</text>

  <!-- SigLIP ViT -->
  <rect x="170" y="165" width="120" height="80" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="172" y="167" width="116" height="76" rx="5" fill="#0f172a"/>
  <rect x="172" y="167" width="116" height="76" rx="5" fill="rgba(8,51,68,0.5)"/>
  <text x="230" y="193" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">SigLIP</text>
  <text x="230" y="209" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">ViT-SO</text>
  <text x="230" y="229" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="sans-serif">196×1024</text>

  <!-- Arrow: Image → SigLIP -->
  <line x1="140" y1="205" x2="168" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Projector -->
  <rect x="325" y="165" width="80" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="327" y="167" width="76" height="76" rx="5" fill="#0f172a"/>
  <rect x="327" y="167" width="76" height="76" rx="5" fill="rgba(120,53,15,0.3)"/>
  <text x="365" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle" font-family="sans-serif">Projector</text>
  <text x="365" y="213" fill="#fbbf24" font-size="8" text-anchor="middle" font-family="sans-serif">1024→4096</text>
  <text x="365" y="231" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">~4M</text>

  <!-- Arrow: SigLIP → Projector -->
  <line x1="290" y1="205" x2="323" y2="205" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- STAGE 2: 语言基座 -->
  <rect x="430" y="55" width="275" height="265" rx="10" fill="url(#grad-language)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="440" y="75" fill="#34d399" font-size="10" font-weight="600" font-family="sans-serif">阶段 2 · 语言基座</text>
  <text x="440" y="90" fill="#475569" font-size="8" font-family="sans-serif">LLaMA 2 7B · 32 层 · d=4096</text>

  <!-- LLaMA 7B -->
  <rect x="450" y="155" width="155" height="100" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="452" y="157" width="151" height="96" rx="7" fill="#0f172a"/>
  <rect x="452" y="157" width="151" height="96" rx="7" fill="rgba(6,78,59,0.5)"/>
  <text x="527" y="185" fill="white" font-size="12" font-weight="700" text-anchor="middle" font-family="sans-serif">LLaMA 2 7B</text>
  <text x="527" y="205" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">32 层 Transformer</text>
  <text x="527" y="220" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="sans-serif">d_model=4096</text>
  <text x="527" y="240" fill="#34d399" font-size="8" text-anchor="middle" font-family="sans-serif">196 视觉 + N 文本 token</text>

  <!-- Arrow: Projector → LLaMA -->
  <line x1="405" y1="205" x2="448" y2="205" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Text Prompt input -->
  <rect x="460" y="112" width="135" height="30" rx="4" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="527" y="131" fill="#fb923c" font-size="8" text-anchor="middle" font-family="sans-serif">📝 "Task: pick bowl..."</text>
  <line x1="527" y1="142" x2="527" y2="153" stroke="#fb923c" stroke-width="1"/>

  <!-- Visual token injection -->
  <text x="500" y="265" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">视觉 token 拼接到文本 token 前</text>
  <text x="500" y="278" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">自回归生成 8 个动作 token</text>

  <!-- STAGE 3: 动作解码 -->
  <rect x="720" y="55" width="310" height="240" rx="10" fill="rgba(167,139,250,0.05)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="730" y="75" fill="#a78bfa" font-size="10" font-weight="600" font-family="sans-serif">阶段 3 · 动作解码</text>
  <text x="730" y="90" fill="#475569" font-size="8" font-family="sans-serif">Action Head · 7 个分类头</text>

  <!-- Action Head -->
  <rect x="740" y="165" width="135" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="742" y="167" width="131" height="76" rx="5" fill="#0f172a"/>
  <rect x="742" y="167" width="131" height="76" rx="5" fill="rgba(76,29,149,0.4)"/>
  <text x="807" y="193" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">Action Head</text>
  <text x="807" y="211" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">7 × Linear</text>
  <text x="807" y="229" fill="#a78bfa" font-size="8" text-anchor="middle" font-family="sans-serif">4096 → 256 bins</text>

  <!-- Arrow: LLaMA → Action Head -->
  <line x1="605" y1="205" x2="738" y2="205" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="670" y="198" fill="#475569" font-size="7" text-anchor="middle" font-family="sans-serif">8 个 token</text>

  <!-- Action Output -->
  <rect x="900" y="160" width="120" height="90" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="902" y="162" width="116" height="86" rx="5" fill="#0f172a"/>
  <rect x="902" y="162" width="116" height="86" rx="5" fill="rgba(136,19,55,0.4)"/>
  <text x="960" y="188" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">🦾 7-dim</text>
  <text x="960" y="204" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">Action</text>
  <text x="960" y="222" fill="#fb7185" font-size="8" text-anchor="middle" font-family="sans-serif">Δx Δy Δz</text>
  <text x="960" y="238" fill="#fb7185" font-size="8" text-anchor="middle" font-family="sans-serif">roll pitch yaw g</text>

  <!-- Arrow: Action Head → Output -->
  <line x1="875" y1="205" x2="898" y2="205" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- Dimension Annotations -->
  <text x="87" y="270" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">(224,224,3)</text>
  <text x="230" y="270" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">(196,1024)</text>
  <text x="527" y="302" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">(196+N, 4096)</text>
  <text x="807" y="270" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">(7, 256 bins)</text>
  <text x="960" y="270" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">(7,) ∈ [-1,+1]</text>

  <!-- Color Legend -->
  <rect x="35" y="345" width="14" height="10" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="56" y="353" fill="#94a3b8" font-size="8" font-family="sans-serif">视觉编码 (SigLIP)</text>
  <rect x="200" y="345" width="14" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="221" y="353" fill="#94a3b8" font-size="8" font-family="sans-serif">投影对齐</text>
  <rect x="330" y="345" width="14" height="10" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="351" y="353" fill="#94a3b8" font-size="8" font-family="sans-serif">语言基座 (LLaMA)</text>
  <rect x="505" y="345" width="14" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="526" y="353" fill="#94a3b8" font-size="8" font-family="sans-serif">动作头 (Action Head)</text>
  <rect x="700" y="345" width="14" height="10" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="721" y="353" fill="#94a3b8" font-size="8" font-family="sans-serif">动作输出</text>

  <!-- Data Flow Summary -->
  <rect x="35" y="380" width="980" height="75" rx="8" fill="rgba(15,23,42,0.8)" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="402" fill="#94a3b8" font-size="9" font-weight="600" font-family="sans-serif">数据流维度变化</text>
  <text x="55" y="422" fill="#475569" font-size="8" font-family="sans-serif">
    (224,224,3) ──▶ (196,1024) ──▶ (196,4096) ──▶ (196+N,4096) ──▶ (7,256) ──▶ (7,)
  </text>
  <text x="55" y="442" fill="#475569" font-size="8" font-family="sans-serif">
    RGB 像素 → 视觉特征 → 维度对齐 → 多模态融合 → 离散分类 → 连续动作
  </text>

  <!-- Token Mechanism -->
  <rect x="670" y="470" width="345" height="42" rx="4" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="680" y="486" fill="#fbbf24" font-size="8" font-family="sans-serif">🔑 每个动作维度被量化为 256 个均匀桶，输出 token ID 对应桶索引</text>
  <text x="680" y="502" fill="#475569" font-size="7" font-family="sans-serif">例: token_id=150 → -1 + (150/255)×2 = +0.176 (Δx 方向位移)</text>

</svg>
