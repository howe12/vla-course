<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="425" y="35" fill="white" font-size="13" font-weight="700" text-anchor="middle" font-family="sans-serif">MuJoCo 仿真控制闭环</text>

  <!-- Camera Input -->
  <rect x="30" y="100" width="100" height="60" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="80" y="126" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">📷 相机图像</text>
  <text x="80" y="146" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">224×224 RGB</text>

  <!-- Arrow -->
  <line x1="130" y1="130" x2="198" y2="130" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- VLA Model -->
  <rect x="200" y="90" width="140" height="80" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="2"/>
  <rect x="202" y="92" width="136" height="76" rx="7" fill="#0f172a"/>
  <rect x="202" y="92" width="136" height="76" rx="7" fill="rgba(6,78,59,0.5)"/>
  <text x="270" y="120" fill="white" font-size="12" font-weight="700" text-anchor="middle" font-family="sans-serif">VLA 模型</text>
  <text x="270" y="140" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">推理 ~25ms</text>
  <text x="270" y="158" fill="#34d399" font-size="8" text-anchor="middle" font-family="sans-serif">输出 7-dim 动作</text>

  <!-- Arrow -->
  <line x1="340" y1="130" x2="408" y2="130" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Target Joint Angles -->
  <rect x="410" y="100" width="130" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="475" y="126" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="sans-serif">目标关节角</text>
  <text x="475" y="146" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">6-DOF + gripper</text>

  <!-- Arrow to PD -->
  <line x1="540" y1="130" x2="608" y2="130" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- PD Controller -->
  <rect x="610" y="90" width="160" height="80" rx="8" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="2"/>
  <rect x="612" y="92" width="156" height="76" rx="7" fill="#0f172a"/>
  <rect x="612" y="92" width="156" height="76" rx="7" fill="rgba(136,19,55,0.3)"/>
  <text x="690" y="120" fill="white" font-size="12" font-weight="700" text-anchor="middle" font-family="sans-serif">MuJoCo PD 控制</text>
  <text x="690" y="140" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="sans-serif">物理仿真引擎</text>
  <text x="690" y="158" fill="#fb7185" font-size="8" text-anchor="middle" font-family="sans-serif">1 kHz 力矩/位置控制</text>

  <!-- Feedback arrow (bottom, right to left) -->
  <line x1="770" y1="130" x2="770" y2="210" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="770" y1="210" x2="80" y2="210" stroke="#fb7185" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="690" y="205" fill="#475569" font-size="8" text-anchor="middle" font-family="sans-serif">末端位置反馈</text>

  <!-- Feedback label -->
  <text x="425" y="230" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle" font-family="sans-serif">🔄 闭环控制：VLA 规划 → PD 执行 → 状态反馈 → 下一帧推理</text>

  <!-- Legend -->
  <rect x="30" y="260" width="14" height="10" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="50" y="269" fill="#94a3b8" font-size="8" font-family="sans-serif">VLA 推理</text>
  <rect x="140" y="260" width="14" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="160" y="269" fill="#94a3b8" font-size="8" font-family="sans-serif">动作输出</text>
  <rect x="260" y="260" width="14" height="10" rx="2" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="280" y="269" fill="#94a3b8" font-size="8" font-family="sans-serif">物理执行</text>
</svg>